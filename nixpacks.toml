[phases.setup]
nixPkgs = ["python311", "nodejs"]

[phases.install]
cmds = [
    "pip install -r backend/requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "rm -rf backend/dist",
    "cp -r frontend/dist backend/dist"
]

[start]
cmd = "gunicorn --chdir backend app:app --bind 0.0.0.0:${PORT:-5000} --workers 2 --timeout 120"
